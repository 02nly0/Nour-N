<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>

  <meta http-equiv="X-Frame-Options" content="DENY">

  <meta name="referrer" content="strict-origin-when-cross-origin">
  <meta name="Permissions-Policy" content="camera=(), microphone=(), geolocation=(self), interest-cohort=()">
  <meta name="description" content="القرآن الكريم — استمع واقرأ القرآن الكريم بأصوات أشهر القراء مع التفسير">
  <meta name="theme-color" content="#0a0a0f">
  <link rel="dns-prefetch" href="https://cdnjs.cloudflare.com">
  <link rel="preconnect" href="https://cdnjs.cloudflare.com">
  <link rel="dns-prefetch" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="dns-prefetch" href="https://fonts.gstatic.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 40 40%22><path d=%22M20 4 C10 4 4 12 4 20 C4 28 10 36 20 36 C26 36 30 33 33 29.5 C28.5 31.5 22.5 31 18 27 C13.5 23 12 17 14.5 12 C16 9 19 7 22 6 C21.5 5 21 4.5 20 4Z%22 fill=%22%23d4a849%22/></svg>" type="image/svg+xml">
  <title>القرآن الكريم — نور</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha256-wiz7ZSCn/btzhjKDQBms9Hx4sSeUYsDrTLg7roPstac=" crossorigin="anonymous">
  <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Inter:wght@300;400;500;600;700;800&family=Noto+Naskh+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div id="pageLoader" class="page-loader">
    <div class="loader-content">
      <div class="loader-dots"><span></span><span></span><span></span></div>
      <p class="loader-tip" id="loaderTip"></p>
    </div>
  </div>

  <header class="main-header">
    <div class="header-inner">
      <a href="index.html" class="logo">
        <span class="logo-icon"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" width="28" height="28"><path d="M20 4 C10 4 4 12 4 20 C4 28 10 36 20 36 C26 36 30 33 33 29.5 C28.5 31.5 22.5 31 18 27 C13.5 23 12 17 14.5 12 C16 9 19 7 22 6 C21.5 5 21 4.5 20 4Z" fill="currentColor"/><circle cx="15" cy="12" r="1.5" fill="#0a0a0f"/></svg></span>
        <span class="logo-text"><span class="logo-main">نور</span><span class="logo-sub">Noor</span></span>
      </a>
      <nav class="nav-links">
        <a href="index.html">الرئيسية</a>
        <a href="quran.html" class="active">القرآن</a>
        <a href="adhkar.html">الأذكار</a>
        <a href="tasbih.html">التسبيح</a>
        <a href="dua.html">الأدعية</a>
        <a href="hadith.html">الأحاديث</a>
        <button id="themeToggleBtn" class="theme-toggle-btn" title="الوضع الليلي/النهاري"><i class="fa-solid fa-moon"></i></button>
        <a href="settings.html"><i class="fa-solid fa-sliders"></i></a>
      </nav>
    </div>
  </header>

  <main class="wrapper">
    <div class="page-header">
      <div style="display:flex;align-items:center;gap:12px;">
        <a href="index.html" class="back-btn"><i class="fa-solid fa-arrow-right"></i></a>
        <h2>القرآن الكريم</h2>
      </div>
      <label class="search-box">
        <i class="fa-solid fa-magnifying-glass"></i>
        <input id="surahSearch" type="search" placeholder="ابحث عن سورة...">
      </label>
    </div>

    <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px;flex-wrap:wrap;">
      <span style="color:var(--text-secondary);font-size:12px;font-weight:600;"><i class="fa-solid fa-microphone"></i> اختر القارئ:</span>
      <select id="reciterSelect" class="reciter-select"></select>
      <div class="volume-control">
        <input type="range" id="volumeSlider" min="0" max="1" step="0.05">
      </div>
      <label class="setting-toggle" style="flex-shrink:0;">
        <span class="setting-toggle-text" style="font-size:12px;">تكرار الآية</span>
        <input type="checkbox" id="repeatToggle">
        <span class="toggle-track"></span>
      </label>
      <label class="setting-toggle" style="flex-shrink:0;">
        <span class="setting-toggle-text" style="font-size:12px;">التفسير</span>
        <input type="checkbox" id="tafsirToggle">
        <span class="toggle-track"></span>
      </label>
    </div>

    <div class="surah-grid" id="surahGrid"></div>

    <div class="quran-reader" id="quranReader">
      <div class="reader-header">
        <div>
          <div class="reader-title" id="readerTitle"></div>
          <div style="color:var(--text-secondary);font-size:12px;" id="readerInfo"></div>
        </div>
        <div class="audio-controls">
          <button id="prevAyahBtn" class="audio-btn" title="الآية السابقة"><i class="fa-solid fa-forward"></i></button>
          <button id="playBtn" class="audio-btn play" title="تشغيل / إيقاف"><i class="fa-solid fa-play" id="playIcon"></i></button>
          <button id="nextAyahBtn" class="audio-btn" title="الآية التالية"><i class="fa-solid fa-backward"></i></button>
        </div>
      </div>
      <div class="ayah-list" id="ayahList"></div>
    </div>
  </main>

  <footer class="main-footer">
    <div class="footer-decoration">﷽</div>
    <a href="donate.html" class="footer-donate"><i class="fa-solid fa-heart"></i> ساهم في دعم نور</a>
    <div class="footer-social">
      <a href="#" class="social-link" aria-label="X"><i class="fa-brands fa-x-twitter"></i></a>
      <a href="#" class="social-link" aria-label="تيليغرام"><i class="fa-brands fa-telegram"></i></a>
      <a href="#" class="social-link" aria-label="يوتيوب"><i class="fa-brands fa-youtube"></i></a>
    </div>
    <div class="footer-links">
      <a href="about.html">عن نور</a>
      <a href="privacy.html">سياسة الخصوصية</a>
      <a href="terms.html">الشروط والأحكام</a>
      <a href="report.html">الإبلاغ عن خطأ</a>
      <a href="reports.html">لوحة التحكم</a>
    </div>
    <p>جعل الله هذا العمل خالصًا لوجهه الكريم</p>
    <p>&copy; 1447 هـ — جميع الحقوق محفوظة لـ نور</p>
  </footer>

  <div class="quick-access-panel">
    <button class="quick-access-toggle" id="quickAccessToggle" title="الوصول السريع"><i class="fa-solid fa-bolt"></i></button>
    <div class="quick-access-items" id="quickAccessItems"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
