<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="لوحة التحكم — موقع نور">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com https://fonts.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com; font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com data:; connect-src 'self' https://api.aladhan.com https://api.alquran.cloud https://cdn.islamic.network https://download.islamic.network https://api.hadith.gading.dev; img-src 'self' data:; frame-ancestors 'none'; form-action 'self'; base-uri 'self'">

  <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin">
  <meta name="referrer" content="strict-origin-when-cross-origin">
  <meta name="Permissions-Policy" content="camera=(), microphone=(), geolocation=(self), interest-cohort=()">
  <meta name="theme-color" content="#0a0a0f">
  <link rel="dns-prefetch" href="https://cdnjs.cloudflare.com">
  <link rel="preconnect" href="https://cdnjs.cloudflare.com">
  <link rel="dns-prefetch" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="dns-prefetch" href="https://fonts.gstatic.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 40 40%22><path d=%22M20 4 C10 4 4 12 4 20 C4 28 10 36 20 36 C26 36 30 33 33 29.5 C28.5 31.5 22.5 31 18 27 C13.5 23 12 17 14.5 12 C16 9 19 7 22 6 C21.5 5 21 4.5 20 4Z%22 fill=%22%23d4a849%22/></svg>" type="image/svg+xml">
  <title>لوحة التحكم — نور</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha256-wiz7ZSCn/btzhjKDQBms9Hx4sSeUYsDrTLg7roPstac=" crossorigin="anonymous">
  <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Inter:wght@300;400;500;600;700;800&family=Noto+Naskh+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    #passwordGate {
      position: fixed; inset: 0; z-index: 9999;
      background: var(--bg);
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
    }
    #passwordGate.hidden { display: none; }
    .report-item {
      padding: 16px; border-radius: var(--radius-sm);
      border: 1px solid var(--border); background: var(--surface);
      margin-bottom: 10px;
    }
  </style>
</head>
<body>
  <div id="passwordGate">
    <div class="gate-box">
      <div style="font-size:36px;color:var(--accent);margin-bottom:12px;"><i class="fa-solid fa-lock"></i></div>
      <h2>لوحة التحكم</h2>
      <p>أدخل كلمة المرور للوصول إلى التقارير</p>
      <input type="password" id="passwordInput" placeholder="كلمة المرور" autocomplete="off" dir="ltr" style="width:100%;padding:12px 16px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:16px;text-align:center;margin-bottom:12px;">
      <button class="btn btn-accent" id="unlockBtn" style="width:100%;justify-content:center;"><i class="fa-solid fa-key"></i> دخول</button>
      <div class="gate-error" id="gateError">كلمة المرور خطأ</div>
    </div>
  </div>

  <header class="main-header">
    <div class="header-inner">
      <a href="index.html" class="logo">
        <span class="logo-icon"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" width="28" height="28"><path d="M20 4 C10 4 4 12 4 20 C4 28 10 36 20 36 C26 36 30 33 33 29.5 C28.5 31.5 22.5 31 18 27 C13.5 23 12 17 14.5 12 C16 9 19 7 22 6 C21.5 5 21 4.5 20 4Z" fill="currentColor"/><circle cx="15" cy="12" r="1.5" fill="#0a0a0f"/></svg></span>
        <span class="logo-text"><span class="logo-main">نور</span><span class="logo-sub">Noor</span></span>
      </a>
      <nav class="nav-links">
        <a href="index.html">الرئيسية</a>
        <a href="quran.html">القرآن</a>
        <a href="adhkar.html">الأذكار</a>
        <a href="tasbih.html">التسبيح</a>
        <a href="dua.html">الأدعية</a>
        <a href="hadith.html">الأحاديث</a>
        <button id="themeToggleBtn" class="theme-toggle-btn" title="الوضع الليلي/النهاري"><i class="fa-solid fa-moon"></i></button>
        <a href="settings.html"><i class="fa-solid fa-sliders"></i></a>
      </nav>
    </div>
  </header>

  <main class="wrapper" id="dashboardMain" style="display:none;">
    <div class="page-header">
      <h2>التقارير الواردة</h2>
      <button class="btn btn-outline" id="refreshReportsBtn"><i class="fa-solid fa-rotate"></i> تحديث</button>
    </div>

    <div class="sync-note">
      <i class="fa-solid fa-cloud-arrow-up"></i>
      <span style="white-space:nowrap;">رابط التخزين:</span>
      <input type="text" id="webhookUrl" value="https://api.jsonbin.io/v3/b/YOUR_BIN_ID" dir="ltr">
      <button class="btn btn-outline" id="saveWebhookBtn" style="white-space:nowrap;">حفظ</button>
    </div>

    <div style="display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin-bottom:12px;">
      <select id="filterType" class="reciter-select" style="min-width:120px;">
        <option value="all">جميع الأنواع</option>
        <option value="audio">الصوت</option>
        <option value="display">العرض</option>
        <option value="performance">الأداء</option>
        <option value="translation">الترجمة</option>
        <option value="design">التصميم</option>
        <option value="other">أخرى</option>
      </select>
      <button id="clearReportsBtn" class="btn btn-outline" style="color:var(--red);"><i class="fa-solid fa-trash"></i> مسح الكل</button>
    </div>

    <div class="stored-count" id="storedCount">0 تقارير</div>
    <div id="reportsList"></div>
  </main>

  <footer class="main-footer">
    <div class="footer-decoration">﷽</div>
    <div class="footer-links">
      <a href="index.html">الرئيسية</a>
      <a href="report.html">الإبلاغ عن خطأ</a>
    </div>
    <p>&copy; 1447 هـ - جميع الحقوق محفوظة لـ نور</p>
  </footer>

  <script>
    (function() {
      var PASSWORD_HASH = 'fea2c61a';
      var STORAGE_KEY = 'noorReports';
      var WEBHOOK_KEY = 'noorWebhookUrl';

      function legacyHash(str) {
        if (!str) return '';
        var h = 0;
        for (var i = 0; i < str.length; i++) {
          h = ((h << 5) - h) + str.charCodeAt(i);
          h |= 0;
        }
        var hex = '';
        for (var i = 0; i < 8; i++) {
          hex += ((h >>> (i * 4)) & 0xf).toString(16);
        }
        return hex;
      }

      async function secureHash(str) {
        if (!str) return '';
        var encoder = new TextEncoder();
        var data = encoder.encode('Noor:' + str);
        var hashBuffer = await crypto.subtle.digest('SHA-256', data);
        var hashArray = Array.from(new Uint8Array(hashBuffer));
        var hashHex = hashArray.map(function(b) { return b.toString(16).padStart(2, '0'); }).join('');
        return 'sha256$' + hashHex;
      }

      async function checkPassword(input) {
        var saved = PASSWORD_HASH;
        if (saved.indexOf('sha256$') === 0) {
          return (await secureHash(input)) === saved;
        }
        return legacyHash(input) === saved;
      }

      var gate = document.getElementById('passwordGate');
      var dashboard = document.getElementById('dashboardMain');
      var passwordInput = document.getElementById('passwordInput');
      var unlockBtn = document.getElementById('unlockBtn');
      var gateError = document.getElementById('gateError');

      function unlock() {
        gate.classList.add('hidden');
        dashboard.style.display = 'block';
        passwordInput.value = '';
        gateError.style.display = 'none';
        document.title = 'التقارير - نور';
        loadReports();
      }

      unlockBtn.addEventListener('click', function() {
        var input = passwordInput.value.trim();
        if (!input) { gateError.style.display = 'block'; passwordInput.focus(); return; }
        checkPassword(input).then(function(ok) {
          if (ok) { unlock(); }
          else { gateError.style.display = 'block'; passwordInput.value = ''; passwordInput.focus(); }
        });
      });
      passwordInput.addEventListener('keydown', function(e) { if (e.key === 'Enter') unlockBtn.click(); });

      var reportsList = document.getElementById('reportsList');
      var storedCount = document.getElementById('storedCount');
      var filterType = document.getElementById('filterType');
      var webhookUrl = document.getElementById('webhookUrl');
      var refreshBtn = document.getElementById('refreshReportsBtn');
      var clearBtn = document.getElementById('clearReportsBtn');
      var saveWebhookBtn = document.getElementById('saveWebhookBtn');

      var savedUrl = localStorage.getItem(WEBHOOK_KEY);
      if (savedUrl) webhookUrl.value = savedUrl;
      saveWebhookBtn.addEventListener('click', function() { localStorage.setItem(WEBHOOK_KEY, webhookUrl.value.trim()); if(typeof App!=='undefined'&&App.toast)App.toast('تم حفظ الرابط'); });

      function getReports() { try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; } catch(e) { return []; } }
      function saveReports(arr) { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(arr)); } catch(e) {} }

      function escapeHtml(str) {
        if (typeof str !== 'string') return '';
        var d = document.createElement('div');
        d.appendChild(document.createTextNode(str));
        return d.innerHTML;
      }

      function loadReports() {
        var all = getReports();
        var filter = filterType.value;
        var filtered = filter === 'all' ? all : all.filter(function(r) { return r.type === filter; });
        filtered.reverse();
        storedCount.textContent = all.length + ' تقارير';
        if (!filtered.length) { reportsList.innerHTML = '<div class="empty-state"><i class="fa-solid fa-inbox"></i><p>لا توجد تقارير بعد</p></div>'; return; }
        reportsList.innerHTML = '';
        filtered.forEach(function(r) {
          var div = document.createElement('div');
          div.className = 'report-item';
          var dateStr = r.date ? new Date(r.date).toLocaleDateString('ar', { year:'numeric', month:'short', day:'numeric', hour:'2-digit', minute:'2-digit' }) : '--';
          var safePage = escapeHtml(r.page || '');
          var safeType = escapeHtml(r.type || '');
          var safeDesc = escapeHtml(r.desc || '');
          div.innerHTML = '<div class="report-meta"><span class="report-badge page">' + safePage + '</span><span class="report-badge type">' + safeType + '</span><span class="report-date">' + escapeHtml(dateStr) + '</span></div><div class="report-desc">' + safeDesc + '</div>';
          reportsList.appendChild(div);
        });
      }

      filterType.addEventListener('change', loadReports);
      refreshBtn.addEventListener('click', loadReports);
      clearBtn.addEventListener('click', function() { if (confirm('مسح جميع التقارير?')) { saveReports([]); loadReports(); if(typeof App!=='undefined'&&App.toast)App.toast('تم مسح التقارير'); } });

      var savedHash = localStorage.getItem('noorAdminHash');
      if (savedHash) PASSWORD_HASH = savedHash;
      if (typeof App !== 'undefined' && App.Settings) App.Settings.init();
    })();
  </script>
  <script src="script.js"></script>
</body>
</html>
